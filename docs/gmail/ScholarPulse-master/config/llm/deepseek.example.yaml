# DeepSeek LLM 配置模板
#
# 使用方法：
# 1. 复制本文件为 config/llm/deepseek.local.yaml。
# 2. 在 config.local.yaml 中设置：
#    llm:
#      config_path: "config/llm/deepseek.local.yaml"
# 3. 在 .env 中填写 DEEPSEEK_API_KEY=你的真实 key。
# 4. config/llm/*.local.yaml 和 .env 已加入 .gitignore。

provider: "openai_compatible"

# 单次 DeepSeek API 请求超时秒数。DeepSeek 可能排队，建议 180-600。
timeout_seconds: 300

# 单次模型输出 token 上限。普通文献摘要建议 3000-6000。
# 如果一次处理很多条目，可优先增加批次数，而不是无限增大本值。
max_output_tokens: 4000

openai_compatible:
  # DeepSeek 官方 OpenAI-compatible base_url。
  base_url: "https://api.deepseek.com"

  # 从哪个环境变量读取 API key。不要把真实 key 写入 yaml。
  api_key_env: "DEEPSEEK_API_KEY"

  # 低成本、低延迟推荐模型。
  model: "deepseek-v4-flash"

  # 非思考模式下生效。0.1-0.3 更适合稳定 JSON、翻译和摘要。
  temperature: 0.2

  # DeepSeek 思考模式只支持 high/max；本项目默认关闭思考模式，所以留空。
  reasoning_effort: ""

  # 开启 JSON Output：请求体会包含 response_format: {"type": "json_object"}。
  response_format_json: true

  # DeepSeek v4 默认开启思考模式。此处关闭思考模式以降低延迟和成本。
  extra_body:
    thinking:
      type: "disabled"
